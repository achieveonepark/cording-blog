<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="face-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d2b0d"/>
      <stop offset="100%" stop-color="#030a03"/>
    </radialGradient>
    <radialGradient id="eye-grad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#00ff41"/>
      <stop offset="60%" stop-color="#00cc33"/>
      <stop offset="100%" stop-color="#003300"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#030d03"/>

  <!-- Matrix rain hints -->
  <text x="6"  y="18" font-family="monospace" font-size="7" fill="#00ff41" opacity="0.12">01</text>
  <text x="80" y="22" font-family="monospace" font-size="7" fill="#00ff41" opacity="0.10">1</text>
  <text x="10" y="88" font-family="monospace" font-size="7" fill="#00ff41" opacity="0.10">0</text>
  <text x="76" y="86" font-family="monospace" font-size="7" fill="#00ff41" opacity="0.12">10</text>
  <text x="88" y="55" font-family="monospace" font-size="6" fill="#00ff41" opacity="0.08">1</text>
  <text x="3"  y="52" font-family="monospace" font-size="6" fill="#00ff41" opacity="0.08">0</text>

  <!-- Shell hex scales (top of head) -->
  <!-- Center hex -->
  <polygon points="50,12 58,17 58,27 50,32 42,27 42,17"
           fill="#071507" stroke="#00cc33" stroke-width="0.9" opacity="0.75"/>
  <!-- Left hex -->
  <polygon points="35,19 43,24 43,34 35,39 27,34 27,24"
           fill="#071507" stroke="#00cc33" stroke-width="0.9" opacity="0.60"/>
  <!-- Right hex -->
  <polygon points="65,19 73,24 73,34 65,39 57,34 57,24"
           fill="#071507" stroke="#00cc33" stroke-width="0.9" opacity="0.60"/>
  <!-- Small partial hex center-low -->
  <polygon points="50,30 57,35 57,42 50,47 43,42 43,35"
           fill="#071507" stroke="#00cc33" stroke-width="0.7" opacity="0.40"/>

  <!-- Main face shape -->
  <ellipse cx="50" cy="62" rx="34" ry="31"
           fill="url(#face-grad)" stroke="#00ff41" stroke-width="1.6"
           filter="url(#glow)"/>

  <!-- Left eye outer ring -->
  <circle cx="37" cy="58" r="9"
          fill="#020c02" stroke="#00ff41" stroke-width="1.3" filter="url(#glow)"/>
  <!-- Left eye iris -->
  <circle cx="37" cy="58" r="6" fill="url(#eye-grad)"/>
  <!-- Left eye pupil -->
  <circle cx="37" cy="58" r="3" fill="#001800"/>
  <!-- Left eye highlight -->
  <circle cx="39.5" cy="55.5" r="1.8" fill="#00ff41" filter="url(#glow-strong)"/>
  <circle cx="40.5" cy="54.8" r="0.7" fill="#ccffcc" opacity="0.9"/>

  <!-- Right eye outer ring -->
  <circle cx="63" cy="58" r="9"
          fill="#020c02" stroke="#00ff41" stroke-width="1.3" filter="url(#glow)"/>
  <!-- Right eye iris -->
  <circle cx="63" cy="58" r="6" fill="url(#eye-grad)"/>
  <!-- Right eye pupil -->
  <circle cx="63" cy="58" r="3" fill="#001800"/>
  <!-- Right eye highlight -->
  <circle cx="65.5" cy="55.5" r="1.8" fill="#00ff41" filter="url(#glow-strong)"/>
  <circle cx="66.5" cy="54.8" r="0.7" fill="#ccffcc" opacity="0.9"/>

  <!-- Eyebrows (subtle matrix serious look) -->
  <path d="M 29 50 Q 37 46 45 49"
        stroke="#00dd33" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 71 50 Q 63 46 55 49"
        stroke="#00dd33" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Nostrils -->
  <ellipse cx="45" cy="70" rx="1.8" ry="1.2" fill="#00ff41" opacity="0.45"/>
  <ellipse cx="55" cy="70" rx="1.8" ry="1.2" fill="#00ff41" opacity="0.45"/>

  <!-- Cute smile -->
  <path d="M 38 76 Q 50 86 62 76"
        stroke="#00ff41" stroke-width="2" fill="none" stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Chin outline hint -->
  <path d="M 28 68 Q 50 88 72 68"
        stroke="#00882a" stroke-width="0.7" fill="none" opacity="0.3"/>
</svg>
